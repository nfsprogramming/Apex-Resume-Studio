services:
  - type: web
    name: smart-resume-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: NVIDIA_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
